<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8"/>
    <title>Mermaid view</title>
    <!-- mermaid.js — 첫 로드 시 인터넷 필요 (offline 보장 필요 시 wwwroot/lib/mermaid.min.js 동봉으로 전환).
         pin: mermaid@11 (Ev2 와 동일 메이저). -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <style>
        html, body { height: 100%; }
        body {
            margin: 0; padding: 12px;
            background: #0b1220; color: #e2e8f0;
            font-family: "Segoe UI", "Inter", system-ui, sans-serif;
            font-size: 13px;
            box-sizing: border-box;
        }
        #root { width: 100%; }
        .block { margin-bottom: 18px; }
        .block-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 4px; gap: 8px;
        }
        .block-title { font-weight: 600; font-size: 12px; color: #e2e8f0; }
        .copy-btn {
            background: #334155; color: #e2e8f0;
            border: 1px solid #475569;
            padding: 3px 12px; cursor: pointer;
            font-size: 11px; border-radius: 3px;
            font-family: inherit;
        }
        .copy-btn:hover { background: #475569; }
        .copy-btn.copied { background: #0c4a6e; border-color: #38bdf8; color: #e0f2fe; }
        .mermaid-host {
            background: #1e293b;
            border: 1px solid #475569;
            border-radius: 3px;
            padding: 12px;
            overflow: auto;
            min-height: 80px;
        }
        .mermaid-host svg { max-width: 100%; }
        .empty {
            color: #94a3b8; font-style: italic;
            padding: 24px; text-align: center;
        }
        .render-error {
            color: #fb923c;
            background: #2a1808;
            border: 1px solid #7c2d12;
            border-radius: 3px;
            padding: 8px 12px;
            font-family: "Cascadia Mono", "Consolas", monospace;
            font-size: 11px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
<div id="root">
    <div class="empty">렌더링 대기 중...</div>
</div>

<script>
    // mermaid v11 — 노드 클래스(:::advance 등) 와 themeVariables 모두 지원.
    // ModelProtocol.Mermaid.fs 가 emit 하는 themeHeader 의 init directive 도 inline 처리.
    mermaid.initialize({
        startOnLoad: false,
        theme: 'dark',
        securityLevel: 'loose',
        flowchart: { useMaxWidth: false, htmlLabels: true }
    });

    function makeCopyButton(text) {
        const btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = '텍스트 복사';
        btn.title = '이 mermaid 텍스트를 클립보드로 복사';
        btn.onclick = async () => {
            try {
                await navigator.clipboard.writeText(text);
                btn.classList.add('copied');
                btn.textContent = '복사됨';
                setTimeout(() => {
                    btn.classList.remove('copied');
                    btn.textContent = '텍스트 복사';
                }, 1500);
            } catch (e) {
                // WebView2 의 clipboard API 가 차단된 경우 C# fallback 으로 위임.
                if (window.chrome && window.chrome.webview) {
                    window.chrome.webview.postMessage({ type: 'copy', text: text });
                    btn.classList.add('copied');
                    btn.textContent = '복사됨';
                    setTimeout(() => {
                        btn.classList.remove('copied');
                        btn.textContent = '텍스트 복사';
                    }, 1500);
                }
            }
        };
        return btn;
    }

    async function render(blocks) {
        const items = blocks || [];
        const root = document.getElementById('root');
        if (typeof mermaid === 'undefined') {
            // CDN 로드 실패 — offline 또는 jsdelivr 다운. wwwroot/lib/ 로 동봉 전환 검토.
            root.innerHTML = '<div class="render-error">mermaid.js 로드 실패 — 인터넷 연결을 확인하세요.\n(CDN: cdn.jsdelivr.net/npm/mermaid@11)</div>';
            return;
        }
        if (items.length === 0) {
            root.innerHTML = '<div class="empty">표시할 mermaid block 이 없습니다.</div>';
            return;
        }
        root.innerHTML = '';
        items.forEach((b, i) => {
            const block = document.createElement('div');
            block.className = 'block';

            const header = document.createElement('div');
            header.className = 'block-header';
            const title = document.createElement('span');
            title.className = 'block-title';
            title.textContent = b.title;
            header.appendChild(title);
            header.appendChild(makeCopyButton(b.mermaid));

            const host = document.createElement('div');
            host.className = 'mermaid-host';
            host.id = 'host-' + i;

            block.appendChild(header);
            block.appendChild(host);
            root.appendChild(block);
        });

        // mermaid 의 render API 를 block 마다 호출. error 시 해당 host 에만 메시지 출력 (다른 block 영향 0).
        for (let i = 0; i < items.length; i++) {
            const host = document.getElementById('host-' + i);
            const id = 'mermaid-svg-' + i + '-' + Date.now();
            try {
                const { svg } = await mermaid.render(id, items[i].mermaid);
                host.innerHTML = svg;
            } catch (e) {
                const errBox = document.createElement('div');
                errBox.className = 'render-error';
                errBox.textContent = 'mermaid 렌더링 실패: ' + (e && e.message ? e.message : String(e));
                host.innerHTML = '';
                host.appendChild(errBox);
            }
        }
    }

    // C# → JS PostWebMessageAsJson 수신.
    if (window.chrome && window.chrome.webview) {
        window.chrome.webview.addEventListener('message', (e) => {
            const data = e.data;
            if (data && data.type === 'render') {
                render(data.blocks || []);
            }
        });
        // C# 측에 페이지 ready 신호 — NavigationCompleted 만으론 script 실행 보장 안 됨.
        window.chrome.webview.postMessage({ type: 'ready' });
    }
</script>
</body>
</html>
