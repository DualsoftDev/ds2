<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ds2 3D View</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0f172a; }
        #scene3d { width: 100vw; height: 100vh; display: block; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: #0f172a; color: #64748b; font-family: sans-serif;
            font-size: 14px; pointer-events: none;
        }
        #overlay.hidden { display: none; }

        /* Sound toggle button */
        #sound-btn {
            position: fixed; bottom: 12px; right: 12px; z-index: 100;
            background: rgba(30,41,59,0.85); border: 1px solid #334155;
            border-radius: 8px; padding: 5px 10px;
            color: #94a3b8; font-family: sans-serif; font-size: 13px;
            cursor: pointer; user-select: none; display: none;
            transition: background 0.15s, color 0.15s;
        }
        #sound-btn:hover { background: #334155; color: #e2e8f0; }
        #sound-btn.active { color: #e2e8f0; }

        /* 조작 힌트 (3D 모델 등록 화면과 통일) */
        #info {
            position: fixed; top: 8px; left: 8px; z-index: 100;
            background: rgba(30,41,59,0.75); border: 1px solid #334155;
            border-radius: 6px; padding: 4px 8px;
            color: #94a3b8; font-family: sans-serif; font-size: 11px;
            pointer-events: none; user-select: none;
        }

        /* Context menu */
        #ctx-menu {
            display: none; position: fixed; z-index: 9999;
            background: #1e293b; border: 1px solid #334155;
            border-radius: 6px; padding: 4px 0; min-width: 190px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.6);
            font-family: sans-serif;
        }
        .ctx-item {
            padding: 8px 14px; color: #e2e8f0; cursor: pointer;
            font-size: 13px; display: flex; align-items: center; gap: 8px;
            user-select: none;
        }
        .ctx-item:hover { background: #334155; }
        .ctx-item.disabled { color: #64748b; cursor: default; }
        .ctx-item.disabled:hover { background: transparent; }
        .ctx-sep { height: 1px; background: #334155; margin: 4px 0; }
    </style>
</head>
<body>
    <div id="scene3d"></div>
    <div id="overlay">
        <span>시뮬레이션을 시작하면 3D 장비 배치도가 표시됩니다.</span>
    </div>

    <!-- 조작 힌트 -->
    <div id="info">드래그: 회전 · 휠클릭/우드래그: 이동 · 스크롤: 줌</div>

    <!-- Sound toggle button -->
    <button id="sound-btn" class="active" title="사운드 켜기/끄기 (M)" onclick="toggleSound()">🔊</button>

    <!-- Context menu -->
    <div id="ctx-menu">
        <div class="ctx-item" id="ctx-fit"     onclick="ctxFitCamera()">📷 카메라 맞춤 (F)</div>
        <div class="ctx-item" id="ctx-layout"  onclick="ctxAutoLayout()">📐 전체 재배치</div>
        <div class="ctx-sep"></div>
        <div class="ctx-item" id="ctx-reset"   onclick="ctxResetLayout()">🗑️ 저장 위치 초기화</div>
    </div>

    <!-- Three.js r128 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <!-- Ds2 3D 모델 라이브러리 (SystemType 기반 Lib3D 로딩) -->
    <script src="models/index.js"></script>

    <!-- Ds2 3D 렌더러 -->
    <script src="js/ds-3d-commons.js"></script>
    <script src="js/three-interop.js?v=2"></script>

    <!-- Ds2 사운드 엔진 -->
    <script src="js/ds2-sound.js"></script>

    <!-- WPF WebView2 폴리필 -->
    <script src="js/wpf-dotnet-polyfill.js"></script>

    <script>
        var SCENE_ID = 'scene3d';
        var initialized = false;
        // 모델 사전 로드 Promise (init 시 시작, addDevice 시 완료 대기)
        var _modelsReady = Promise.resolve();

        // ─── C# (WPF) → JS ────────────────────────────────────────────────────
        function handleFromCSharp(msg) {
            try {
                if (msg.type === 'init') {
                    document.getElementById('overlay').classList.add('hidden');
                    Ev23DViewer.init(SCENE_ID, msg.config || {});
                    Ev23DViewer.setCallSelectionCallback(SCENE_ID, window._wpfCallbackRef);
                    setupContextMenu();
                    initialized = true;
                    document.getElementById('sound-btn').style.display = 'block';

                    if (window.Ds2View3DLibrary) {
                        var customModels = (msg.config && msg.config.customModels) || {};
                        var initDevices  = (msg.config && msg.config.devices)      || [];

                        // (W1) 해시 기반 조건부 preload 캐시 무효화 — 커스텀 모델이 바뀌었을 때만 리셋.
                        //      재배치만 반복하는 경우 preload skip 으로 원샷 전환 달성.
                        var newKey = JSON.stringify(customModels);
                        if (Ds2View3DLibrary._cachedCustomModelsKey !== newKey) {
                            Ds2View3DLibrary._preloadPromise = null;
                            Ds2View3DLibrary._cachedCustomModelsKey = newKey;
                        }

                        _modelsReady = (async function() {
                            await Ds2View3DLibrary.preloadGenericDevice();
                            // replace 시맨틱 — 삭제/추가 반영 위해 매 init 호출
                            Ds2View3DLibrary.registerAllFromJSON(customModels);
                            console.log('✅ Custom models registered:', Object.keys(customModels));
                            await Ds2View3DLibrary.preloadAll();

                            // (W3) devices 가 init 에 포함됐으면 일괄 추가. WorkScene 처럼 없는 경로는 skip.
                            if (Array.isArray(initDevices) && initDevices.length > 0) {
                                for (var i = 0; i < initDevices.length; i++) {
                                    var d = initDevices[i];
                                    try {
                                        Ev23DViewer.addDeviceAtPosition(SCENE_ID, d.device, d.x, d.z);
                                    } catch (e) {
                                        console.error('[init] addDevice failed:', d, e);
                                    }
                                }
                                Ev23DViewer.fitCameraToDevices(SCENE_ID);
                            }
                        })();
                    }
                } else if (!initialized) {
                    return;
                } else if (msg.type === 'addDevice') {
                    var _msg = msg;
                    _modelsReady.then(function() {
                        Ev23DViewer.addDeviceAtPosition(SCENE_ID, _msg.device, _msg.x, _msg.z);
                    });
                } else if (msg.type === 'batchStateUpdate') {
                    // C#에서 apiDef + device 상태를 단일 메시지로 전송
                    if (msg.apiDefStates) Ev23DViewer.updateApiDefStates(SCENE_ID, msg.apiDefStates);
                    if (msg.deviceStates) Ev23DViewer.updateDeviceStates(SCENE_ID, msg.deviceStates);
                } else if (msg.type === 'updateWorkStates') {
                    Ev23DViewer.updateWorkStates(SCENE_ID, msg.states);
                } else if (msg.type === 'updateDeviceStates') {
                    Ev23DViewer.updateDeviceStates(SCENE_ID, msg.states);
                } else if (msg.type === 'updateApiDefStates') {
                    Ev23DViewer.updateApiDefStates(SCENE_ID, msg.states);
                } else if (msg.type === 'resetDeviceStates') {
                    // Reset all devices to Ready state
                    if (Ev23DViewer.resetDeviceStates) {
                        Ev23DViewer.resetDeviceStates(SCENE_ID);
                    }
                } else if (msg.type === 'showApiDefConnections') {
                    // Show ApiDef connection arrows
                    console.log(`[handleFromCSharp] showApiDefConnections: device=${msg.deviceId}, apiDef=${msg.apiDefName}, out=${(msg.outgoing||[]).length}, in=${(msg.incoming||[]).length}`);
                    if (Ev23DViewer.showApiDefConnections) {
                        Ev23DViewer.showApiDefConnections(SCENE_ID, msg.deviceId, msg.apiDefName,
                            msg.outgoing || [], msg.incoming || []);
                    } else {
                        console.warn('[handleFromCSharp] Ev23DViewer.showApiDefConnections not found!');
                    }
                } else if (msg.type === 'fitAll') {
                    Ev23DViewer.fitCameraToDevices(SCENE_ID);
                }
            } catch (e) {
                console.error('handleFromCSharp error:', e, msg);
            }
        }

        // ─── Context menu ──────────────────────────────────────────────────────
        function setupContextMenu() {
            var canvas = document.querySelector('#scene3d canvas');
            if (!canvas) return;

            // 우클릭 드래그(팬)와 짧은 우클릭(메뉴) 구분.
            // OrbitControls 의 pointer capture 영향을 피하기 위해 capture phase 로 먼저 받고,
            // 판정은 contextmenu 가 아닌 pointerup 에서 수행한다.
            var rDown = null;
            var DRAG_PX = 6;

            canvas.addEventListener('pointerdown', function(e) {
                if (e.button === 2) rDown = { x: e.clientX, y: e.clientY };
            }, true);

            canvas.addEventListener('pointerup', function(e) {
                if (e.button !== 2 || !rDown) return;
                var dist = Math.hypot(e.clientX - rDown.x, e.clientY - rDown.y);
                rDown = null;
                if (dist <= DRAG_PX) showCtxMenu(e.clientX, e.clientY);
            }, true);

            canvas.addEventListener('pointercancel', function() { rDown = null; }, true);

            // 브라우저 기본 컨텍스트 메뉴만 차단 (커스텀 메뉴는 pointerup 에서 이미 처리)
            canvas.addEventListener('contextmenu', function(e) { e.preventDefault(); });

            document.addEventListener('click', function(e) {
                if (!e.target.closest('#ctx-menu')) hideCtxMenu();
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') hideCtxMenu();
                if ((e.key === 'f' || e.key === 'F') && !e.ctrlKey && !e.altKey) {
                    Ev23DViewer.fitCameraToDevices(SCENE_ID);
                }
                if ((e.key === 'm' || e.key === 'M') && !e.ctrlKey && !e.altKey) {
                    toggleSound();
                }
            });
        }

        function showCtxMenu(x, y) {
            var menu = document.getElementById('ctx-menu');
            menu.style.display = 'block';
            var mw = 200, mh = 130;
            var vw = window.innerWidth, vh = window.innerHeight;
            menu.style.left = (x + mw > vw ? x - mw : x) + 'px';
            menu.style.top  = (y + mh > vh ? y - mh : y) + 'px';
        }

        function hideCtxMenu() {
            document.getElementById('ctx-menu').style.display = 'none';
        }

        function ctxFitCamera() {
            Ev23DViewer.fitCameraToDevices(SCENE_ID);
            hideCtxMenu();
        }

        function ctxAutoLayout() {
            Ev23DViewer.autoLayoutDevices(SCENE_ID);
            hideCtxMenu();
        }

        function ctxResetLayout() {
            Ev23DViewer.resetDeviceLayout(SCENE_ID);
            hideCtxMenu();
        }

        function toggleSound() {
            if (!window.Ds2Sound) return;
            Ds2Sound.setMuted(!Ds2Sound.muted);
            var btn = document.getElementById('sound-btn');
            if (Ds2Sound.muted) {
                btn.textContent = '🔇';
                btn.classList.remove('active');
            } else {
                btn.textContent = '🔊';
                btn.classList.add('active');
            }
        }
</script>
</body>
</html>
