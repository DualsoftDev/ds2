<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thick Glassmorphism Diverter Card with 3D Glass Donut</title>
    <style>
        /* 심해/우주 느낌의 어두운 배경 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at 50% 50%, #0d2b42, #020a14);
        }

        /* ✨ 두꺼운 유리 블록 카드 컨테이너 */
        .glass-card {
            position: relative;
            width: 360px;
            padding: 30px;
            border-radius: 24px;
            
            /* 유리 질감 베이스 */
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.01) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(0, 200, 255, 0.3);

            /* 다중 그림자로 입체감 표현 */
            box-shadow: 
                0 30px 50px rgba(0, 0, 0, 0.5),
                inset 0 0 20px rgba(0, 191, 255, 0.15),
                inset 0 1px 2px rgba(255, 255, 255, 0.4),
                inset 0 -2px 5px rgba(0, 0, 0, 0.5);
        }

        /* ✨ 카드 유리 앞면 생성 (두께감 착시) */
        .glass-card::before {
            content: '';
            position: absolute;
            inset: 8px; /* 8px 두께 착시 */
            border-radius: 16px;
            border-top: 2px solid rgba(255, 255, 255, 0.6);
            border-left: 2px solid rgba(255, 255, 255, 0.4);
            border-right: 1px solid rgba(0, 200, 255, 0.2);
            border-bottom: 1px solid rgba(0, 200, 255, 0.2);
            pointer-events: none; 
        }

        /* --------------------------------
           카드 내부 콘텐츠 스타일 
        -------------------------------- */
        .card-content {
            position: relative;
            z-index: 1;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 헤더 영역 (제목 + 최소 배지) */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-title {
            font-size: 2rem;
            font-weight: 700;
            margin: 0;
            text-shadow: 0 0 15px rgba(0, 191, 255, 0.4);
            letter-spacing: -0.5px;
        }

        .badge {
            background: rgba(0, 191, 255, 0.2);
            color: #00e6ff;
            border: 1px solid rgba(0, 191, 255, 0.4);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* 본문 영역 (차트 + 데이터) */
        .card-body {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-top: 5px;
        }

        /* ✨ 글래스모피즘 도넛 차트 컨테이너 */
        .chart-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ✨ 3D SVG 글래스 도넛 차트 구현 */
        .chart-wrapper svg {
            display: block; /* ensure svg occupies space */
        }

        /* ✨ SVG 필터 및 그라데이션 정의 (CSS 내에서는 정의 안 함, HTML 내부에 있음) */

        /* 차트 중앙 텍스트 */
        .chart-total {
            position: absolute;
            font-size: 1.5rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            /* 중앙 텍스트가 SVG 위에 오도록 함 */
            pointer-events: none;
            z-index: 2; /* SVG보다 위에 오도록 */
        }

        /* 우측 데이터 리스트 영역 */
        .stats-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* "Ready" 상태 텍스트 (이제 데이터 리스트 상단에 위치) */
        .status-ready {
            font-size: 1.2rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        /* 수치 정보 데이터 */
        .stat-items {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            font-size: 1.15rem;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.7);
            width: 50px;
            font-weight: 500;
        }

        .stat-value {
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* 차트 범례 역할의 빛나는 컬러 도트 */
        .stat-item::before {
            content: '';
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        /* 가동 - 파란색 (네온 빛) */
        .stat-item.active::before { background-color: #3a86ff; box-shadow: 0 0 8px #3a86ff; } 
        /* 대기 - 주황색 (부드러운 네온 빛) */
        .stat-item.standby::before { background-color: #ff9f1c; box-shadow: 0 0 8px #ff9f1c; }

    </style>
</head>
<body>

    <div class="glass-card">
        <div class="card-content">
            <div class="card-header">
                <h2 class="card-title">Diverter#4</h2>
                <div class="badge">최소</div>
            </div>

            <div class="card-body">
                <div class="chart-section">
                    <div class="chart-wrapper">
                        <svg width="150" height="150" viewBox="0 0 150 150">
                            <defs>
                                <linearGradient id="active-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                                    <stop offset="0%" style="stop-color:#4a90e2;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#3a86ff;stop-opacity:0.6" />
                                </linearGradient>
                                <linearGradient id="standby-grad" x1="0%" y1="0%" x2="0%" y2="100%">
                                    <stop offset="0%" style="stop-color:#ffb347;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#ff9f1c;stop-opacity:0.6" />
                                </linearGradient>
                                <filter id="glass-effect" x="-50%" y="-50%" width="200%" height="200%">
                                    <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.4" />
                                    <feMerge>
                                        <feMergeNode in="DropShadow" />
                                        <feMergeNode in="SourceGraphic" />
                                    </feMerge>
                                    <feComponentTransfer in="SourceGraphic">
                                        <feFuncA type="linear" slope="0.8" /> </feComponentTransfer>
                                </filter>
                                <radialGradient id="inner-edge-grad" cx="50%" cy="50%" r="50%">
                                    <stop offset="0%" style="stop-color:white;stop-opacity:0.2" />
                                    <stop offset="95%" style="stop-color:white;stop-opacity:0" />
                                </radialGradient>
                            </defs>
                            <circle cx="75" cy="75" r="60" stroke="#cccccc" stroke-width="12" fill="none" style="opacity:0.1" />
                            <circle cx="75" cy="75" r="60" stroke="url(#active-grad)" stroke-width="12" fill="none"
                                    stroke-dasharray="204 377" stroke-dashoffset="0" style="filter:url(#glass-effect)" />
                            <circle cx="75" cy="75" r="60" stroke="url(#standby-grad)" stroke-width="12" fill="none"
                                    stroke-dasharray="173 377" stroke-dashoffset="-204" style="filter:url(#glass-effect)" />
                            <circle cx="75" cy="75" r="54" fill="url(#inner-edge-grad)" pointer-events="none" />
                        </svg>
                        <span class="chart-total">22.2s</span>
                    </div>
                </div>

                <div class="stats-section">
                    <div class="status-ready">Ready</div>
                    <div class="stat-items">
                        <div class="stat-item active">
                            <span class="stat-label">가동</span>
                            <span class="stat-value">12.0s</span>
                        </div>
                        <div class="stat-item standby">
                            <span class="stat-label">대기</span>
                            <span class="stat-value">10.2s</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
