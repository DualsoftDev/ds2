<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Ds2.View3D - 전체 라이브러리 (29개)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: #e2e8f0;
    padding: 20px;
  }
  .header {
    text-align: center;
    margin-bottom: 30px;
  }
  .header h1 {
    font-size: 2.5em;
    margin-bottom: 10px;
    background: linear-gradient(45deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header p {
    color: #94a3b8;
    font-size: 1.2em;
  }
  .stats {
    background: rgba(51, 65, 85, 0.5);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 20px;
    text-align: center;
  }
  .stats strong {
    color: #fbbf24;
    font-size: 1.3em;
  }
  .category {
    margin-bottom: 40px;
  }
  .category-title {
    font-size: 1.8em;
    margin-bottom: 15px;
    color: #22d3ee;
    border-bottom: 2px solid rgba(34, 211, 238, 0.3);
    padding-bottom: 10px;
  }
  .model-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }
  .model-card {
    background: rgba(30, 41, 59, 0.8);
    border-radius: 12px;
    padding: 15px;
    border: 1px solid rgba(100, 116, 139, 0.5);
  }
  .model-card h3 {
    margin-bottom: 5px;
    color: #fff;
    font-size: 1.2em;
  }
  .device-type {
    font-size: 0.85em;
    color: #94a3b8;
    font-family: 'Courier New', monospace;
    margin-bottom: 5px;
  }
  .commands {
    font-size: 0.8em;
    color: #60a5fa;
    font-family: 'Courier New', monospace;
    margin-bottom: 10px;
  }
  .canvas-container {
    width: 100%;
    height: 280px;
    background: #0f172a;
    border-radius: 8px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .controls {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .btn {
    flex: 1;
    min-width: 60px;
    padding: 6px 8px;
    border: none;
    border-radius: 6px;
    font-size: 0.75em;
    font-weight: bold;
    cursor: pointer;
    color: #fff;
    transition: all 0.15s;
  }
  .btn:hover {
    transform: scale(1.05);
  }
  .btn:active {
    transform: scale(0.95);
  }
  .btn-cmd { background: #8b5cf6; }
  .btn-r { background: #10b981; }
  .btn-g { background: #eab308; }
  .btn-f { background: #3b82f6; }
  .btn-h { background: #6b7280; }
  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin: 30px 0;
    padding: 20px;
    background: rgba(51, 65, 85, 0.5);
    border-radius: 12px;
  }
  .page-btn {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-size: 1em;
    font-weight: bold;
    cursor: pointer;
    color: #fff;
    background: #3b82f6;
    transition: all 0.2s;
  }
  .page-btn:hover:not(:disabled) {
    background: #2563eb;
    transform: scale(1.05);
  }
  .page-btn:disabled {
    background: #475569;
    cursor: not-allowed;
    opacity: 0.5;
  }
  .page-info {
    color: #22d3ee;
    font-size: 1.2em;
    font-weight: bold;
    min-width: 150px;
    text-align: center;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🏭 Ds2.View3D 전체 라이브러리</h1>
  <p>모든 액추에이터 (29개)</p>
</div>

<div class="stats">
  <p><strong>총 29개 모델</strong> | 5개씩 페이지 전환</p>
  <p id="loading-status" style="margin-top: 10px; color: #22d3ee;">로딩 중...</p>
</div>

<div class="pagination">
  <button class="page-btn" id="prev-btn" onclick="goToPrevPage()">◀ 이전</button>
  <div class="page-info" id="page-info">Page 1 / 6</div>
  <button class="page-btn" id="next-btn" onclick="goToNextPage()">다음 ▶</button>
</div>

<div id="content-area"></div>

<div class="pagination">
  <button class="page-btn" id="prev-btn-bottom" onclick="goToPrevPage()">◀ 이전</button>
  <div class="page-info" id="page-info-bottom">Page 1 / 6</div>
  <button class="page-btn" id="next-btn-bottom" onclick="goToNextPage()">다음 ▶</button>
</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="./index.js"></script>

<script>
const scenes = {};
const models = {};
const animations = {};

const deviceConfig = {
  'AGV': { title: 'AGV', category: 'robots', commands: ['MOVE', 'TURN', 'STOP'] },
  'Robot_6Axis': { title: '6축 로봇', category: 'robots', commands: ['CMD1', 'CMD2', 'HOME'] },
  'Robot_SCARA': { title: 'SCARA 로봇', category: 'robots', commands: ['POS1', 'POS2', 'HOME'] },
  'Robot_Delta': { title: '델타 로봇', category: 'robots', commands: ['PICK', 'PLACE', 'HOME'] },
  'Robot_Collaborative': { title: '협동 로봇', category: 'robots', commands: ['ASSIST', 'WORK', 'HOME'] },
  'Robot_Gantry': { title: '갠트리 로봇', category: 'robots', commands: ['MOVE_X', 'MOVE_Y', 'MOVE_Z'] },
  'Gripper_Pneumatic': { title: '공압 그리퍼', category: 'robots', commands: ['GRIP', 'RELEASE', 'HOLD'] },
  'Gripper_Vacuum': { title: '진공 그리퍼', category: 'robots', commands: ['SUCTION_ON', 'SUCTION_OFF', 'PICKUP'] },
  'Conveyor': { title: '컨베이어', category: 'conveyors', commands: ['MOVE', 'STOP'] },
  'Conveyor_Belt_Animated': { title: '애니메이션 컨베이어', category: 'conveyors', commands: ['RUN', 'STOP', 'REVERSE'] },
  'Lifter': { title: '리프터', category: 'conveyors', commands: ['UP', 'DOWN'] },
  'Lift_Table': { title: '리프트 테이블', category: 'conveyors', commands: ['RAISE', 'LOWER', 'HOLD'] },
  'Pusher': { title: '푸셔', category: 'conveyors', commands: ['FWD', 'BWD'] },
  'Pusher_Pneumatic': { title: '공압 푸셔', category: 'conveyors', commands: ['PUSH', 'RETRACT', 'HOLD'] },
  'Rotary_Table': { title: '회전 테이블', category: 'conveyors', commands: ['ROTATE_CW', 'ROTATE_CCW', 'STOP'] },
  'Transfer_Shuttle': { title: '셔틀 이송기', category: 'conveyors', commands: ['SHUTTLE_LEFT', 'SHUTTLE_RIGHT', 'CENTER'] },
  'Turntable': { title: '턴테이블', category: 'conveyors', commands: ['TURN_90', 'TURN_180', 'RESET'] },
  'Elevator_Vertical': { title: '수직 엘리베이터', category: 'conveyors', commands: ['FLOOR_1', 'FLOOR_2', 'FLOOR_3'] },
  'Tilter': { title: '틸터', category: 'conveyors', commands: ['TILT_FORWARD', 'TILT_BACK', 'LEVEL'] },
  'Stacker': { title: '스태커', category: 'conveyors', commands: ['UP', 'DOWN', 'EXTEND'] },
  'Sorter_Diverter': { title: '다이버터', category: 'conveyors', commands: ['DIVERT_LEFT', 'DIVERT_RIGHT', 'CENTER'] },
  'Crane_Overhead_Animated': { title: '오버헤드 크레인', category: 'cranes', commands: ['MOVE_X', 'MOVE_Y', 'HOIST_UP', 'HOIST_DOWN'] },
  'Hoist': { title: '호이스트', category: 'cranes', commands: ['LIFT', 'LOWER', 'HOLD'] },
  'Jib_Crane': { title: '지브 크레인', category: 'cranes', commands: ['ROTATE', 'EXTEND', 'RETRACT', 'HOIST'] },
  'Door_Sliding': { title: '슬라이딩 도어', category: 'gates', commands: ['OPEN', 'CLOSE', 'HOLD'] },
  'Gate_Vertical': { title: '수직 게이트', category: 'gates', commands: ['RAISE', 'LOWER', 'STOP'] },
  'Barrier_Arm': { title: '차단기 암', category: 'gates', commands: ['RAISE', 'LOWER', 'STOP'] },
  'Unit': { title: '유닛', category: 'others', commands: ['ADV', 'RET'] },
  'Dummy': { title: 'Dummy', category: 'others', commands: [] }
};

function createDeviceCard(deviceName, config) {
  const card = document.createElement('div');
  card.className = 'model-card';
  card.innerHTML = '<h3>' + config.title + '</h3><div class="device-type">DeviceType: "' + deviceName + '"</div><div class="commands">Commands: ' + (config.commands.join(', ') || 'None') + '</div><div class="canvas-container" id="' + deviceName + '"></div><div class="controls">' + config.commands.map(function(cmd) { return '<button class="btn btn-cmd" onclick="executeCommand(\'' + deviceName + '\', \'' + cmd + '\')">' + cmd + '</button>'; }).join('') + '<button class="btn btn-r" onclick="setState(\'' + deviceName + '\', \'R\')">R</button><button class="btn btn-g" onclick="setState(\'' + deviceName + '\', \'G\')">G</button><button class="btn btn-f" onclick="setState(\'' + deviceName + '\', \'F\')">F</button><button class="btn btn-h" onclick="setState(\'' + deviceName + '\', \'H\')">H</button></div>';
  return card;
}

function initScene(containerId) {
  const container = document.getElementById(containerId);
  if (!container) return null;
  const width = container.clientWidth;
  const height = container.clientHeight;
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0f172a);
  const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
  camera.position.set(3, 2.5, 5);
  camera.lookAt(0, 1, 0);
  const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "low-power" });
  renderer.setSize(width, height);
  renderer.shadowMap.enabled = false;
  container.appendChild(renderer.domElement);
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const light = new THREE.DirectionalLight(0xffffff, 0.8);
  light.position.set(5, 10, 5);
  scene.add(light);
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(10, 10), new THREE.MeshStandardMaterial({ color: 0x1e293b }));
  ground.rotation.x = -Math.PI / 2;
  scene.add(ground);
  scenes[containerId] = { scene: scene, camera: camera, renderer: renderer, controls: controls };
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    const anim = animations[containerId];
    if (anim && anim.active && models[containerId]) {
      const deviceType = models[containerId].userData.deviceType;
      const DeviceClass = window[deviceType];
      if (DeviceClass && DeviceClass.animate) {
        const reached = DeviceClass.animate(models[containerId], anim.direction, anim.speed || 0.03);
        if (reached) {
          animations[containerId].active = false;
          console.log(containerId + ' ' + anim.direction + ' complete');
        }
      }
    }
    renderer.render(scene, camera);
  }
  animate();
  return scenes[containerId];
}

// 페이지네이션: 5개씩 표시
const ITEMS_PER_PAGE = 5;
let currentPage = 1;
let deviceList = [];
let totalPages = 0;
let loadedModels = new Set();

async function initPagination() {
  deviceList = Object.keys(deviceConfig);
  totalPages = Math.ceil(deviceList.length / ITEMS_PER_PAGE);
  updatePageInfo();
  await loadCurrentPage();
}

async function loadCurrentPage() {
  // 페이지 상단으로 스크롤
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // 콘텐츠 영역 초기화
  const contentArea = document.getElementById('content-area');
  contentArea.innerHTML = '';

  // 기존 씬 정리 (메모리 절약)
  cleanupOldScenes();

  // 현재 페이지에 표시할 디바이스 계산
  const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
  const endIndex = Math.min(startIndex + ITEMS_PER_PAGE, deviceList.length);
  const currentDevices = deviceList.slice(startIndex, endIndex);

  updateLoadingStatus('🔄 로딩 중... (0/' + currentDevices.length + ')');

  // 카테고리별로 그룹화
  const categoryGroups = {};
  currentDevices.forEach(deviceName => {
    const category = deviceConfig[deviceName].category;
    if (!categoryGroups[category]) {
      categoryGroups[category] = [];
    }
    categoryGroups[category].push(deviceName);
  });

  // 카테고리 섹션 생성
  const categoryTitles = {
    'robots': '🤖 로봇 / 매니퓰레이터',
    'conveyors': '📦 이송 / 컨베이어 장치',
    'cranes': '🏗️ 크레인 / 호이스트',
    'gates': '🚪 게이트 / 도어',
    'others': '⚙️ 기타'
  };

  for (const category in categoryGroups) {
    const categoryDiv = document.createElement('div');
    categoryDiv.className = 'category';
    categoryDiv.innerHTML = '<h2 class="category-title">' + categoryTitles[category] + '</h2><div class="model-grid" id="grid-' + category + '"></div>';
    contentArea.appendChild(categoryDiv);

    const grid = categoryDiv.querySelector('.model-grid');
    categoryGroups[category].forEach(deviceName => {
      const config = deviceConfig[deviceName];
      grid.appendChild(createDeviceCard(deviceName, config));
    });
  }

  await new Promise(resolve => setTimeout(resolve, 100));

  // 모델 로드
  let loadedCount = 0;
  for (const deviceName of currentDevices) {
    const sceneData = initScene(deviceName);
    if (!sceneData) continue;

    try {
      const model = await Ds2View3DLibrary.create(deviceName, THREE);
      sceneData.scene.add(model);
      models[deviceName] = model;
      animations[deviceName] = { active: false, direction: null, speed: 0.03 };
      loadedModels.add(deviceName);
      loadedCount++;
      console.log('✅ [' + loadedCount + '/' + currentDevices.length + '] ' + deviceName + ' loaded');
      updateLoadingStatus('🔄 로딩 중... (' + loadedCount + '/' + currentDevices.length + ')');
    } catch (e) {
      console.error('❌ ' + deviceName + ' failed:', e);
    }
  }

  updateLoadingStatus('✅ 로드 완료 (' + currentDevices.length + '개)');
  updatePageInfo();
}

function cleanupOldScenes() {
  // 현재 페이지가 아닌 씬들 정리
  const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
  const endIndex = Math.min(startIndex + ITEMS_PER_PAGE, deviceList.length);
  const currentDevices = new Set(deviceList.slice(startIndex, endIndex));

  for (const deviceName in scenes) {
    if (!currentDevices.has(deviceName)) {
      const scene = scenes[deviceName];
      if (scene && scene.renderer) {
        scene.renderer.dispose();
        const container = document.getElementById(deviceName);
        if (container) {
          container.innerHTML = '';
        }
      }
      delete scenes[deviceName];
      delete models[deviceName];
      delete animations[deviceName];
    }
  }
}

function updatePageInfo() {
  const pageText = 'Page ' + currentPage + ' / ' + totalPages;
  document.getElementById('page-info').textContent = pageText;
  document.getElementById('page-info-bottom').textContent = pageText;

  // 버튼 상태 업데이트
  const prevDisabled = currentPage <= 1;
  const nextDisabled = currentPage >= totalPages;

  document.getElementById('prev-btn').disabled = prevDisabled;
  document.getElementById('prev-btn-bottom').disabled = prevDisabled;
  document.getElementById('next-btn').disabled = nextDisabled;
  document.getElementById('next-btn-bottom').disabled = nextDisabled;
}

function updateLoadingStatus(message) {
  const statusEl = document.getElementById('loading-status');
  if (statusEl) {
    statusEl.textContent = message;
  }
}

async function goToNextPage() {
  if (currentPage < totalPages) {
    currentPage++;
    await loadCurrentPage();
  }
}

async function goToPrevPage() {
  if (currentPage > 1) {
    currentPage--;
    await loadCurrentPage();
  }
}

function executeCommand(deviceType, command) {
  const model = models[deviceType];
  if (!model) return;

  // 이미 같은 명령이 실행 중이면 무시
  const currentAnim = animations[deviceType];
  if (currentAnim && currentAnim.active && currentAnim.direction === command) {
    console.log(deviceType + ': ' + command + ' already running');
    return;
  }

  console.log(deviceType + ': ' + command);

  // SCARA 로봇의 경우 새 명령 시작 시 완료 상태 초기화
  if (model.userData.deviceType === 'Robot_SCARA') {
    model.userData.commandCompleted = false;
    model.userData.lastCommand = null;
  }

  animations[deviceType] = { active: true, direction: command, speed: 0.03 };
}

function setState(deviceType, state) {
  const model = models[deviceType];
  if (model) {
    const DeviceClass = window[deviceType];
    if (DeviceClass && DeviceClass.updateState) {
      DeviceClass.updateState(model, state);
    } else if (window.Ds2View3DLibrary && window.Ds2View3DLibrary.updateState) {
      window.Ds2View3DLibrary.updateState(model, state);
    }
  }
}

window.addEventListener('load', initPagination);
</script>

</body>
</html>
