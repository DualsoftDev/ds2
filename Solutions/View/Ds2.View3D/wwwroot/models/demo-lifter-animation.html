<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Lifter Animation Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: #e2e8f0;
  }
  #container { width: 100vw; height: 100vh; }
  #controls {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(30, 41, 59, 0.9);
    padding: 20px;
    border-radius: 12px;
    border: 1px solid rgba(100, 116, 139, 0.5);
    min-width: 300px;
  }
  #controls h2 {
    margin-bottom: 15px;
    font-size: 1.3em;
    color: #60a5fa;
  }
  .btn-group {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }
  button {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 1em;
    font-weight: bold;
    cursor: pointer;
    color: white;
    transition: all 0.2s;
  }
  button:hover {
    transform: scale(1.05);
  }
  .btn-up { background: #10b981; }
  .btn-down { background: #ef4444; }
  .btn-auto { background: #8b5cf6; }
  .btn-stop { background: #6b7280; }
  .slider-group {
    margin-top: 15px;
    padding-top: 15px;
    border-top: 1px solid rgba(100, 116, 139, 0.3);
  }
  .slider-group label {
    display: block;
    margin-bottom: 8px;
    color: #94a3b8;
    font-size: 0.9em;
  }
  input[type="range"] {
    width: 100%;
    margin-bottom: 10px;
  }
  .value-display {
    text-align: center;
    font-size: 1.1em;
    color: #60a5fa;
    font-weight: bold;
  }
  .info {
    margin-top: 15px;
    padding: 10px;
    background: rgba(59, 130, 246, 0.1);
    border-radius: 6px;
    font-size: 0.85em;
    color: #94a3b8;
  }
</style>
</head>
<body>
<div id="container"></div>
<div id="controls">
  <h2>🎮 Lifter Animation</h2>
  
  <div class="btn-group">
    <button class="btn-up" onclick="moveUp()">⬆️ UP</button>
    <button class="btn-down" onclick="moveDown()">⬇️ DOWN</button>
  </div>
  
  <div class="btn-group">
    <button class="btn-auto" onclick="toggleAuto()">🔄 Auto</button>
    <button class="btn-stop" onclick="stopAuto()">⏹️ Stop</button>
  </div>
  
  <div class="slider-group">
    <label>Manual Position Control:</label>
    <input type="range" id="positionSlider" min="0" max="100" value="0" 
           oninput="setManualPosition(this.value)">
    <div class="value-display" id="positionValue">0%</div>
  </div>
  
  <div class="info">
    💡 UP/DOWN: 애니메이션 이동<br>
    💡 Auto: 자동 반복 승강<br>
    💡 Slider: 수동 위치 제어
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="./Lib3D/Lifter.js"></script>

<script>
const container = document.getElementById('container');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f172a);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(3, 2.5, 5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
container.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const light = new THREE.DirectionalLight(0xffffff, 0.8);
light.position.set(5, 10, 5);
light.castShadow = true;
scene.add(light);

const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(10, 10),
  new THREE.MeshStandardMaterial({ color: 0x1e293b })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Create Lifter
let lifter = null;
if (typeof Lifter !== 'undefined') {
  lifter = Lifter.create(THREE, { targetHeight: 3.0 });
  scene.add(lifter);
  console.log('✅ Lifter created');
}

// Animation state
let currentDirection = null;
let autoMode = false;
let autoDirection = 'UP';

function moveUp() {
  stopAuto();
  currentDirection = 'UP';
  console.log('Moving UP');
}

function moveDown() {
  stopAuto();
  currentDirection = 'DOWN';
  console.log('Moving DOWN');
}

function toggleAuto() {
  autoMode = !autoMode;
  if (autoMode) {
    currentDirection = null;
    console.log('Auto mode ON');
  } else {
    console.log('Auto mode OFF');
  }
}

function stopAuto() {
  autoMode = false;
  currentDirection = null;
  console.log('Stopped');
}

function setManualPosition(value) {
  if (!lifter) return;
  
  stopAuto();
  currentDirection = null;
  
  const position = value / 100; // 0.0 to 1.0
  Lifter.setPosition(lifter, position);
  
  document.getElementById('positionValue').textContent = value + '%';
}

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  controls.update();

  if (lifter) {
    // Manual direction control
    if (currentDirection) {
      const reached = Lifter.animate(lifter, currentDirection, 0.05);
      if (reached) {
        currentDirection = null;
        console.log('Reached target');
      }
    }
    
    // Auto mode (continuous up/down)
    if (autoMode) {
      const reached = Lifter.animate(lifter, autoDirection, 0.03);
      if (reached) {
        // Switch direction
        autoDirection = (autoDirection === 'UP') ? 'DOWN' : 'UP';
        console.log('Auto switching to:', autoDirection);
      }
    }
  }

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Keyboard controls
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
    moveUp();
  } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
    moveDown();
  } else if (e.key === ' ') {
    toggleAuto();
  }
});
</script>
</body>
</html>
